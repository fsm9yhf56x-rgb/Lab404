<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page introuvable · lab404</title>
        <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --yellow: #FFB800;
            --yellow-dark: #E5A500;
            --text: #1A1714;
            --cream: #FAF7F2;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            
        }

        /* Cursor */
/* Background grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,184,0,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,184,0,0.06) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* Floating blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            animation: blobFloat 8s ease-in-out infinite;
        }
        .blob-1 { width: 500px; height: 500px; background: var(--yellow); top: -150px; right: -100px; animation-delay: 0s; }
        .blob-2 { width: 300px; height: 300px; background: var(--yellow); bottom: -80px; left: -80px; animation-delay: 3s; }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -20px) scale(1.05); }
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        /* Logo */
        .logo {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            margin-bottom: 1rem;
        }
        .logo .lab { color: var(--text); }
        .logo .bloc { background: var(--yellow); color: var(--text); padding: 0 0.2em; margin-left: 0.04em; }

        /* Big 404 */
        .big-404 {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(8rem, 25vw, 18rem);
            line-height: 0.85;
            letter-spacing: -0.04em;
            color: var(--text);
            position: relative;
            user-select: none;
        }

        .big-404 .zero-mid {
            display: inline-block;
            background: var(--yellow);
            color: var(--text);
            padding: 0 0.05em;
            position: relative;
            animation: pulse404 3s ease-in-out infinite;
        }

        @keyframes pulse404 {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.03); }
        }

        /* Glitch lines on 4s */
        .big-404::before {
            content: '404';
            position: absolute;
            inset: 0;
            font-family: 'Archivo Black', sans-serif;
            font-size: inherit;
            color: var(--yellow);
            clip-path: polygon(0 30%, 100% 30%, 100% 33%, 0 33%);
            animation: glitch 4s infinite;
            opacity: 0.5;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translateX(0); opacity: 0; }
            92% { transform: translateX(-4px); opacity: 0.5; }
            94% { transform: translateX(4px); opacity: 0.5; }
            96% { transform: translateX(-2px); opacity: 0.3; }
            98% { transform: translateX(0); opacity: 0; }
        }

        /* Subtitle */
        .subtitle {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
            color: rgba(26,23,20,0.4);
            letter-spacing: 0.08em;
        }
        .subtitle::before { content: '// '; color: var(--yellow); }

        /* Message */
        .message {
            font-size: 1.1rem;
            color: rgba(26,23,20,0.6);
            line-height: 1.6;
            max-width: 420px;
        }

        /* CTA buttons */
        .cta-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .btn-primary {
            background: var(--yellow);
            color: white;
            padding: 0.9rem 2rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 4px 20px rgba(255,184,0,0.25);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(255,184,0,0.35); }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            padding: 0.9rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            border: 2px solid rgba(26,23,20,0.12);
            transition: all 0.3s ease;
        }
        .btn-secondary:hover { border-color: var(--yellow); color: var(--yellow-dark); transform: translateY(-3px); }

        /* Quick links */
        .quick-links {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
        }
        .quick-link {
            font-size: 0.82rem;
            font-weight: 600;
            color: rgba(26,23,20,0.4);
            text-decoration: none;
            transition: color 0.2s ease;
            letter-spacing: 0.05em;
        }
        .quick-link:hover { color: var(--yellow-dark); }

        /* Tagline bottom */
        .tagline-bottom {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            color: rgba(26,23,20,0.25);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            white-space: nowrap;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .cta-group { flex-direction: column; align-items: center; }
            .quick-links { gap: 1.2rem; }
            body { cursor: auto; }
}
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="content">

        <a href="/" class="logo">
            <span class="lab">lab</span><span class="bloc">404</span>
        </a>

        <div class="big-404">
            4<span class="zero-mid">0</span>4
        </div>

        <div class="subtitle">page_not_found.error</div>

        <p class="message">
            Cette page n'existe pas — ou plus.<br>
            Mais on est là pour construire ce qui n'existe pas encore.
        </p>

        <div class="cta-group">
            <a href="/" class="btn-primary">← Retour à l'accueil</a>
            <a href="contact" class="btn-secondary">Démarrer un projet</a>
        </div>

        <div class="quick-links">
            <a href="portfolio" class="quick-link">Portfolio</a>
            <a href="services" class="quick-link">Services</a>
            <a href="contact" class="quick-link">Contact</a>
        </div>

    </div>

    <div class="tagline-bottom">// made in marseille · lab404.dev</div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', function(e) {
            cursor.style.left = (e.clientX - 10) + 'px';
            cursor.style.top  = (e.clientY - 10) + 'px';
        });
    </script>

</body>
</html>
